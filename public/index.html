<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grisburgh</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            room:    { bg: '#13100b', surface: '#1e1914', elevated: '#2a231b', border: '#3d3428', 'border-light': '#4a3f32' },
            ink:     { bright: '#f0e8d4', medium: '#c4b89a', dim: '#8a7d6a', faint: '#5a5040' },
            gold:    { DEFAULT: '#d4a843', dim: '#a68832', glow: 'rgba(212,168,67,0.15)' },
            seal:    { DEFAULT: '#8b2a2a', glow: 'rgba(139,42,42,0.2)' },
            'blue-ink':  { DEFAULT: '#3a6a9a', glow: 'rgba(58,106,154,0.15)' },
            'green-wax': { DEFAULT: '#3a6a4a', glow: 'rgba(58,106,74,0.15)' },
            'purple-codex': { DEFAULT: '#6a4a8a', glow: 'rgba(106,74,138,0.15)' },
            orange:  { DEFAULT: '#b8763a', glow: 'rgba(184,118,58,0.15)' },
            parchment: { letter: '#f2e6c8', press: '#e8e2d8', map: '#e0d8c4', codex: '#1a1520', log: '#f5f0e5' },
          },
          fontFamily: {
            cinzel:  ['Cinzel', 'serif'],
            crimson: ['Crimson Text', 'Georgia', 'serif'],
            fell:    ['IM Fell English', 'serif'],
            mono:    ['JetBrains Mono', 'monospace'],
          },
          boxShadow: {
            card: '0 2px 12px rgba(0,0,0,0.4)',
            deep: '0 8px 32px rgba(0,0,0,0.6)',
          },
          animation: {
            'modal-in': 'modalIn 0.25s ease',
            'fade-in': 'fadeIn 0.2s ease',
            'reveal-burst': 'revealBurst 0.6s ease',
          },
          keyframes: {
            modalIn:  { from: { opacity: '0', transform: 'translateY(20px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
            fadeIn:   { from: { opacity: '0' }, to: { opacity: '1' } },
            revealBurst: { '0%': { boxShadow: '0 0 0 0 rgba(212,168,67,0.6)' }, '100%': { boxShadow: '0 0 20px 10px rgba(212,168,67,0)' } },
          },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="/css/theme.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-room-bg text-ink-bright font-crimson min-h-screen">
  <div class="app player-mode" id="app">
    <!-- Header -->
    <header class="flex items-center justify-between px-6 py-3 bg-gradient-to-b from-[#1a1510] to-room-bg border-b border-room-border">
      <div>
        <h1 class="font-cinzel text-2xl font-bold text-gold">&#x2694; Grisburgh</h1>
        <p class="text-ink-dim text-sm font-fell italic">De Parel van het Oosten</p>
      </div>
      <div class="flex items-center gap-3">
        <div id="dm-login">
          <button id="dm-login-btn" onclick="window.app.toggleLoginModal()"
            class="px-3 py-1 text-xs font-mono border border-room-border rounded text-ink-dim hover:text-gold hover:border-gold-dim transition">DM</button>
        </div>
        <div id="dm-badge" class="hidden flex items-center gap-2 px-3 py-1 rounded bg-gold-glow border border-gold-dim">
          <span class="text-gold text-xs font-cinzel font-semibold">Dungeon Master</span>
          <button onclick="window.app.logout()" class="text-ink-dim hover:text-ink-bright text-lg leading-none">&times;</button>
        </div>
      </div>
    </header>

    <!-- Section tabs -->
    <nav class="flex gap-1 px-6 pt-2 border-b border-room-border" id="section-tabs">
      <button class="section-tab active" data-section="campagne">&#x2694; Campagne</button>
      <button class="section-tab" data-section="archief">&#x1F4DC; Archief</button>
      <button class="section-tab" data-section="dashboard">&#x1F5FA; Dashboard</button>
    </nav>

    <!-- Sections -->
    <main class="flex-1 overflow-hidden">
      <div class="section active" id="section-campagne"></div>
      <div class="section" id="section-archief"></div>
      <div class="section" id="section-dashboard"></div>
    </main>

    <!-- FAB -->
    <button id="fab" onclick="window.app.onFabClick()"
      class="hidden fixed bottom-6 right-6 w-14 h-14 rounded-full bg-gold text-room-bg text-2xl font-bold shadow-deep hover:scale-110 transition z-40">+</button>
  </div>

  <!-- Login modal -->
  <div class="modal-overlay" id="login-overlay">
    <div class="modal max-w-sm animate-modal-in">
      <div class="modal-head">
        <div class="font-cinzel text-lg text-gold font-bold">DM Login</div>
        <button class="modal-close" onclick="window.app.closeLoginModal()">&times;</button>
      </div>
      <div class="p-5">
        <input type="password" id="dm-password" placeholder="Wachtwoord..."
          class="w-full px-3 py-2 bg-room-bg border border-room-border rounded text-ink-bright font-crimson focus:border-gold-dim focus:outline-none"
          onkeydown="if(event.key==='Enter')window.app.login()">
        <div id="login-error" class="hidden text-seal text-sm mt-2">Verkeerd wachtwoord</div>
        <button onclick="window.app.login()"
          class="w-full mt-3 px-4 py-2 bg-gold-dim text-room-bg font-cinzel font-semibold rounded hover:bg-gold transition">Inloggen</button>
      </div>
    </div>
  </div>

  <!-- Detail / Editor modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal animate-modal-in">
      <div class="modal-head">
        <div>
          <div class="font-cinzel text-xl text-gold font-bold" id="m-title"></div>
          <div class="text-ink-dim text-sm italic" id="m-sub"></div>
        </div>
        <button class="modal-close" onclick="window.app.closeModal()">&times;</button>
      </div>
      <div class="p-5 overflow-y-auto flex-1 min-h-0" id="m-body"></div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="fixed inset-0 bg-black/90 z-50 hidden items-center justify-center">
    <button onclick="window.app.closeLightbox()" class="absolute top-4 right-5 text-white/60 hover:text-white text-3xl z-10">&times;</button>
    <img id="lb-img" class="max-w-[92vw] max-h-[92vh] object-contain rounded" src="">
    <div id="lb-title" class="absolute bottom-5 left-1/2 -translate-x-1/2 text-white/70 bg-black/50 px-4 py-1 rounded text-sm font-fell italic"></div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
